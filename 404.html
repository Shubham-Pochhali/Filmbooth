<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILMBOOTH - 404 Not Found</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,600;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111;
            color: #f3f4f6;
        }
        .font-serif-italic {
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-[#111]">
    <div class="text-center px-6">
        <h1 class="text-[120px] md:text-[180px] font-bold font-serif-italic text-red-600 leading-none mb-4 drop-shadow-[0_0_15px_rgba(220,38,38,0.4)]">404</h1>
        <h2 class="text-xl md:text-2xl font-bold tracking-[0.2em] uppercase text-gray-200 mb-6">Page Not Found</h2>
        <p class="text-gray-400 text-sm mb-12 max-w-md mx-auto leading-relaxed">
            Looks like this film strip got lost in the darkroom. The page you are looking for does not exist or has been moved.
        </p>
        <a href="index.html" class="inline-block bg-white text-black px-8 py-4 font-bold text-[11px] tracking-widest hover:bg-red-600 hover:text-white transition-colors duration-300">
            RETURN TO BOOTH
        </a>
    </div>
    <script src="cursor.js"></script>
</body>
</html>
